name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch project yang mau di-build (contoh: build/my-app)'
        required: false
        default: ''
      flutter_version:
        description: 'Flutter version (kosongkan = latest stable, misal: 3.27.4)'
        required: false
        default: ''

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch
        id: vars
        run: |
          TARGET="${{ github.event.inputs.branch }}"
          if [ -z "$TARGET" ]; then
            TARGET="${{ github.ref_name }}"
          fi
          echo "branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Target branch: $TARGET"

      - name: Checkout project branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Verify project root
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "ERROR: pubspec.yaml tidak ditemukan di branch ini!"
            echo "Branch: ${{ steps.vars.outputs.branch }}"
            echo ""
            echo "Pastikan project Flutter sudah diupload ke branch ini."
            exit 1
          fi

          echo "pubspec.yaml ditemukan:"
          cat pubspec.yaml
          echo ""

          if [ ! -d "android" ]; then
            echo "ERROR: Folder android/ tidak ditemukan!"
            echo "Build APK membutuhkan folder android/ di dalam project."
            exit 1
          fi

          echo "android/ folder ditemukan"
          echo "=== Verifikasi selesai ==="

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version: ${{ github.event.inputs.flutter_version }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release

      - name: Rename & move APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/app-release-$(date +'%Y%m%d-%H%M').apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Release-${{ github.run_number }}
          path: output/*.apk
          retention-days: 90
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version: ${{ github.event.inputs.flutter_version }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release

      - name: Rename & move APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/app-release-$(date +'%Y%m%d-%H%M').apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Release-${{ github.run_number }}
          path: output/*.apk
          retention-days: 90
